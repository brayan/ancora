name: ancora

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ancora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ancora}
      POSTGRES_USER: ${POSTGRES_USER:-ancora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ancora}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ancora-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ancora-postgres-data:
