version: 0.3
project: ancora
status: typescript-first-scaffold
description: AI-native learning platform with grounded flashcards, adaptive quizzes, RAG tutoring, evals, and observability.

startup:
  root_guidance: AGENTS.md
  domain_context: CONTEXT.md
  manifest: docs/agents/repo-manifest.yaml
  project_shards_dir: docs/agents/projects
  rule: Read the root guidance, domain context, this manifest, relevant ADRs, and only the shard for the touched boundary.

canonical_docs:
  architecture_decisions: docs/adr
  documentation_governance: docs/engineering/documentation-governance.md
  git_conventions: docs/engineering/git-conventions.md
  monorepo_conventions: docs/engineering/monorepo-conventions.md
  nextjs_feature_first_convention: docs/frontend/nextjs-feature-first-convention.md
  nextjs_naming_convention: docs/frontend/nextjs-naming-convention.md
  test_impact_policy: docs/testing/change-based-test-coverage-policy.md
  solo_dev_guardrails: docs/ops/solo-dev-guardrails.md
  execution_plans: docs/exec-plans/README.md
  implementation_plan: docs/implementation/ancora-project-plan-v0.2.md

accepted_v1_stack:
  web: Next.js in apps/web
  product_and_ai_runtime: Next.js/Node/TypeScript in apps/web/server owns the v1 product API and AI runtime
  ai_sdk: Vercel AI SDK with OpenAI SDK
  persistence: Drizzle with PostgreSQL and pgvector
  llm_provider: OpenAI is the default v1 LLM and embedding provider
  auth: Auth.js with account ownership is required v1 product scope
  observability: Langfuse JS/TS for LLM traces and eval metadata
  workflows: LangChain.js and LangGraph.js for bounded AI workflows
  local_platform: Docker Compose

deferred_until_adr:
  - separate NestJS or Express microservices
  - Python runtime services and workers
  - Kubernetes
  - Terraform
  - Redis
  - PyTorch
  - uploaded file ingestion

privacy_boundary: Account-owned source material is private and must not leak into logs, traces, fixtures, docs, screenshots, commits, or eval datasets.

command_surface:
  expected:
    - make dev
    - make test
    - make lint
    - make eval-smoke
    - make db-migrate
    - make db-seed
    - make docker-up
    - make docker-down
    - pnpm web:lint
    - pnpm web:typecheck
    - pnpm web:test
    - pnpm eval:smoke
    - pnpm docker:config
    - pnpm docker:up
    - pnpm docker:down
    - pnpm repo:test:fast
    - pnpm repo:test:task
    - pnpm repo:test:context
    - pnpm repo:test:pr
  rule: Until commands exist, inspect available scripts and report missing commands rather than inventing behavior.

project_shards:
  - name: web
    file: docs/agents/projects/web.yaml
    routes:
      - apps/web/**
      - packages/ui/**
      - packages/shared-types/**
      - packages/schemas/**
      - prompts/**
      - docs/frontend/**

  - name: eval-runner
    file: docs/agents/projects/eval-runner.yaml
    routes:
      - tools/eval-runner/**
      - evals/**

  - name: scripts-ci
    file: docs/agents/projects/scripts-ci.yaml
    routes:
      - scripts/**
      - .github/workflows/**
      - infra/**
      - docker/**
      - config/**
      - packages/config/**
      - Makefile
      - package.json
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - .gitignore
      - "*.env.example"
      - docs/agents/**
      - docs/engineering/**
      - docs/testing/**
      - docs/ops/**
      - docs/exec-plans/**

adr_index:
  - docs/adr/0001-use-monorepo.md
  - docs/adr/0002-fastapi-owns-v1-product-and-ai-api.md
  - docs/adr/0003-auth-and-account-are-v1-scope.md
  - docs/adr/0004-use-openai-as-default-llm-provider.md
  - docs/adr/0005-use-postgresql-pgvector-for-v1.md
  - docs/adr/0006-defer-standalone-node-api-kubernetes-terraform.md
  - docs/adr/0007-place-eval-runner-under-services.md
  - docs/adr/0008-use-nextjs-for-v1-client-ui.md
  - docs/adr/0009-nextjs-typescript-owns-v1-product-and-ai-runtime.md
  - docs/adr/0010-defer-python-runtime-to-later-research-and-tooling.md
