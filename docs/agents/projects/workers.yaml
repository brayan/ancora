name: workers
status: planned-after-core-slice
primary_paths:
  - services/workers
read_first:
  - CONTEXT.md
  - docs/adr/0002-fastapi-owns-v1-product-and-ai-api.md
  - docs/adr/0005-use-postgresql-pgvector-for-v1.md
  - docs/adr/0006-defer-standalone-node-api-kubernetes-terraform.md
role: Python workers for async jobs after the core synchronous vertical slice is proven.
allowed_work:
  - embedding jobs
  - account-scoped card generation jobs
  - eval execution jobs coordinated with eval-runner
  - cleanup and maintenance jobs
  - simple local worker execution paths
out_of_scope:
  - Redis dependency before an ADR approves it
  - uploaded file ingestion before the core vertical slice works and an ADR approves it
  - background architecture that changes FastAPI API ownership
privacy_rules:
  - Job metadata should use source IDs, chunk IDs, deck IDs, card IDs, and trace references whenever possible.
  - Worker logs must not include private source material.
validation:
  expected_commands:
    - make lint
    - make test
    - make eval-smoke
  fallback: If commands do not exist, inspect available scripts and report the gap.
